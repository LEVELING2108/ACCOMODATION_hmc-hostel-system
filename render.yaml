services:
  - type: web
    name: hmc-hostel-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir -hmc-hostel-system- app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hmc-db
          property: connectionString
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: hmc-db
    plan: free
